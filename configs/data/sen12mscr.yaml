# SEN12MS-CR triplets: Sentinel-1 (VV/VH) + cloudy Sentinel-2 + clear Sentinel-2.
# Dataset/preprocessing parameters are filled in at Step 3; values here are the
# authoritative physical constants used across the whole pipeline.
name: sen12mscr
root: ${paths.data_dir}/sen12mscr

patch_size: 256

# Sentinel-1 (dB scale). Clip range per Meraner et al. (DSen2-CR) preprocessing.
s1:
  channels: 2  # [VV, VH]
  clip_db: [-25.0, 0.0]

# Sentinel-2 L1C, 13 bands, reflectance stored as uint16 scaled by 10000.
s2:
  channels: 13
  reflectance_scale: 10000.0

# Cloud mask (3-class: thin/thick/shadow). Threshold heuristic for Phase 1;
# TODO(Step 5/7): replace with s2cloudless (see nadir/data/cloud_mask.py).
mask:
  impl: threshold
  thin: 0.35    # mean visible reflectance above which a pixel is thin cloud
  thick: 0.6    # ... thick cloud
  shadow: 0.08  # ... below which a pixel is cloud shadow

# Geometric-only augmentation (flip/rot90) on the train split.
# Color augmentations are forbidden: reflectance is a physical quantity.
augment: true

split:
  # Geographic split by ROI id to prevent spatial leakage between train/val/test.
  strategy: roi
  val_fraction: 0.1
  test_fraction: 0.1
  split_seed: 42

loader:
  batch_size: ${train.batch_size}
  num_workers: 4
  pin_memory: true
