# Root Hydra config. Compose with group configs; override on the CLI, e.g.:
#   python -m nadir.train +experiment=dsen2cr_dummy train.epochs=2
defaults:
  - data: sen12mscr
  - model: dsen2cr
  - train: default
  - _self_

seed: 42
device: cuda  # "cuda" | "cpu"; falls back to cpu automatically if cuda is unavailable

paths:
  # Root directory holding datasets. Override via env var or CLI.
  data_dir: ${oc.env:NADIR_DATA_DIR,data}

# Checkpoint path consumed by `python -m nadir.eval checkpoint=...`.
checkpoint: null

eval:
  # LPIPS backbone; null disables LPIPS (e.g. for offline CI without the
  # torchvision weight download). RGB extraction: B04/B03/B02 = indices 3/2/1.
  lpips_net: alex

wandb:
  project: nadir
  entity: null  # default entity of the logged-in account
  mode: online  # "online" | "offline" | "disabled"
  tags: []
  notes: null
